name: Deploy to Testnet

on:
  push:
    branches:
      - dev

concurrency:
  group: deploy-testnet
  cancel-in-progress: true

env:
  APP: moonlight-beta-privacy-provider-a
  REGIONS: ams gru

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: |
          # First attempt
          if flyctl deploy --remote-only; then
            echo "Deploy succeeded"
          else
            echo "Deploy failed — cleaning up unreachable machines..."
            flyctl machines list --json -a "$APP" | jq -r '.[] | "\(.id) \(.region) \(.state)"'

            for ID in $(flyctl machines list --json -a "$APP" | jq -r '.[].id'); do
              echo "  Destroying $ID"
              flyctl machines destroy "$ID" --force -a "$APP" || true
            done

            echo "Retrying deploy..."
            flyctl deploy --remote-only
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Ensure all regions have machines
        run: |
          MACHINES=$(flyctl machines list --json -a "$APP")
          echo "Current machines:"
          echo "$MACHINES" | jq -r '.[] | "  \(.id) \(.region) \(.state)"'

          for REGION in $REGIONS; do
            COUNT=$(echo "$MACHINES" | jq -r "[.[] | select(.region == \"$REGION\")] | length")
            if [ "$COUNT" -eq 0 ]; then
              # Clone from any running machine into the missing region
              SOURCE=$(echo "$MACHINES" | jq -r '[.[] | select(.state == "started")][0].id')
              echo "No machine in $REGION — cloning $SOURCE"
              flyctl machines clone "$SOURCE" --region "$REGION" -a "$APP"
            else
              echo "Region $REGION: $COUNT machine(s)"
            fi
          done
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
