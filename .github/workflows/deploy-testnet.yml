name: Deploy to Testnet

on:
  push:
    branches:
      - dev

concurrency:
  group: deploy-testnet
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: |
          APP="moonlight-beta-privacy-provider-a"

          # First attempt
          if flyctl deploy --remote-only; then
            echo "Deploy succeeded"
            exit 0
          fi

          echo "Deploy failed — checking for unreachable machines..."
          flyctl machines list --json -a "$APP" | jq -r '.[] | "\(.id) \(.region) \(.state)"'

          # Destroy all machines and retry. Bluegreen recreates them from scratch.
          echo "Destroying all machines for clean bluegreen deploy..."
          for ID in $(flyctl machines list --json -a "$APP" | jq -r '.[].id'); do
            echo "  Destroying $ID"
            flyctl machines destroy "$ID" --force -a "$APP" || true
          done

          echo "Retrying deploy..."
          flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
