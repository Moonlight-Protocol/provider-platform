# fly.mainnet.toml — provider-platform mainnet config

app = 'moonlight-mainnet-provider'
primary_region = 'ams'

[build]

[env]
  PORT = '8080'
  MODE = 'production'
  LOG_LEVEL = 'INFO' # Valid values: FATAL, ERROR, WARN, INFO, DEBUG, TRACE

  # Rule: only INFRASTRUCTURE + OPERATIONAL config goes here. Privacy
  # Provider keys, council references, and contract IDs are stored in the
  # database via the dashboard API and the council join flow — never as env vars.

  # DATABASE
  # DATABASE_URL=set by fly.io provisioned postgres

  # STELLAR
  NETWORK = 'mainnet'
  STELLAR_RPC_URL = 'https://soroban-testnet.stellar.org'
  NETWORK_FEE = '1000000000' #stroops

  # SERVICE
  # SERVICE_DOMAIN — set via Fly secrets per environment
  # SERVICE_AUTH_SECRET=set in fly.io env secrets

  # OPENTELEMETRY
  OTEL_DENO = 'true'
  OTEL_SERVICE_NAME = 'provider-platform'
  OTEL_EXPORTER_OTLP_PROTOCOL = 'http/protobuf'
  # OTEL_EXPORTER_OTLP_ENDPOINT and OTEL_EXPORTER_OTLP_HEADERS set in fly.io secrets

  # AUTH
  CHALLENGE_TTL = '900' #15m
  SESSION_TTL = '21600' #6h

  # MEMPOOL CONFIGURATION
  MEMPOOL_SLOT_CAPACITY = '100'
  MEMPOOL_EXPENSIVE_OP_WEIGHT = '10'
  MEMPOOL_CHEAP_OP_WEIGHT = '1'
  MEMPOOL_EXECUTOR_INTERVAL_MS = '5000'
  MEMPOOL_VERIFIER_INTERVAL_MS = '10000'
  MEMPOOL_TTL_CHECK_INTERVAL_MS = '60000'
  MEMPOOL_MAX_RETRY_ATTEMPTS= '3'
  BUNDLE_MAX_OPERATIONS = '20'
  TRANSACTION_EXPIRATION_OFFSET = '1000' # ledger sequences; ~83min on testnet (~5s/ledger)

[processes]
  app = 'deno task serve'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = "5s"
    timeout = "3s"
    grace_period = "60s"
    method = "GET"
    path = "/api/v1/health"

[deploy]
  strategy = "bluegreen"
  release_command = "deno run -A --node-modules-dir npm:drizzle-kit migrate"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
